<!DOCTYPE html>
<html>
<head>
    <title>Clean My Biz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        textarea { width: 100%; height: 150px; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 30px; padding: 20px; background: #e8f0fe; border-radius: 10px; border-left: 5px solid #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clean My Biz</h1>
        <p style="text-align: center; color: #666;">Paste your messy notes below and I'll organize them.</p>
        <form method="POST">
            <textarea name="content" placeholder="E.g. Spent 50 on gas, 20 on lunch, sold 3 cupcakes for 10 each..."></textarea>
            <button type="submit">Organize Everything</button>
        </form>
        {% if result %}
        <div class="result">
            <h3>Here is your clean data:</h3>
            <div style="white-space: pre-wrap;">{{ result }}</div>
        </div>
        {% endif %}
    </div>
</body>
  </html>
